<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TUSDIO</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card glass">
      <p class="auth-tag">TUSDIO</p>
      <h1>Login</h1>
      <p class="auth-subtext">Sign in to continue.</p>

<form id="loginForm" class="auth-form">
  <input type="email" id="email" placeholder="Email address" required />
  <input type="password" id="password" placeholder="Password" required />
  
  <button type="submit">Login</button>

  <!-- Google Button -->
  <button type="button" id="googleLoginBtn" class="google-btn">
    Continue with Google
  </button>

  <p id="loginMessage" class="auth-message"></p>
</form>

      <p class="auth-switch">
        Don’t have an account?
        <a href="create-account.html">Create one</a>
      </p>
    </div>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
